<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passarinhos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🐦 Cadastro de Passarinhos</h1>

    <form id="form">
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="text" id="anilha" placeholder="Anilha" required>
        <input type="text" id="especie" placeholder="Espécie" required>

        <select id="sexo" required>
            <option value="" disabled selected>Selecione o Sexo</option>
            <option value="Macho">Macho</option>
            <option value="Fêmea">Fêmea</option>
        </select>

        <select id="pai">
            <option value="">Nenhum (Pai Desconhecido)</option>
        </select>

        <select id="mae">
            <option value="">Nenhum (Mãe Desconhecida)</option>
        </select>

        <button type="submit">Cadastrar</button>
    </form>

    <h2>Lista</h2>
    <ul id="lista"></ul>

    <script src="script.js"></script>
</body>
</html>
